services:
  gsvi:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        CUDA_IMAGE: nvidia/cuda:12.8.1-cudnn-devel-ubuntu22.04
        TORCH_VERSION: "2.7.0"
        TORCHAUDIO_VERSION: "2.7.0"
        TORCH_INDEX_URL: https://download.pytorch.org/whl/cu128
    image: gpt-sovits-inference:gsvi
    container_name: gsvi
    ports:
      - "8000:8000"
    volumes:
      - ./models:/workspace/GPT-SoVITS/models
      - ./cache:/workspace/GPT-SoVITS/cache
      - ./custom_refs:/workspace/GPT-SoVITS/custom_refs
      - ./outputs:/workspace/GPT-SoVITS/outputs
      - ./GPT_SoVITS/pretrained_models:/workspace/GPT-SoVITS/GPT_SoVITS/pretrained_models
      - ./GPT_SoVITS/text/G2PWModel:/workspace/GPT-SoVITS/GPT_SoVITS/text/G2PWModel
      - ./tools/asr/models:/workspace/GPT-SoVITS/tools/asr/models
      - ./tools/uvr5/uvr5_weights:/workspace/GPT-SoVITS/tools/uvr5/uvr5_weights
    environment:
      TZ: Asia/Shanghai
      is_half: "true"
      GSVI_BOOTSTRAP_MODELS: "true"
      GSVI_DOWNLOAD_G2PW: "true"
      GSVI_DOWNLOAD_UVR5: "false"
      GSVI_OPEN_BROWSER: "false"
      GSVI_HOST: "0.0.0.0"
      GSVI_PORT: "8000"
      MODEL_SOURCE: HF
    gpus: all
    shm_size: "8g"
    stdin_open: true
    tty: true
    restart: unless-stopped
